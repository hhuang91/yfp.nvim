name: CI

on:
  push:
  pull_request:

jobs:
  readonly:
    name: read-only invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_no_writes.sh

  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.5.2
          args: --check .

  test:
    name: load + path tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - run: nvim --headless -l tests/run.lua
      - run: nvim --headless -l tests/func.lua
